name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage
        if: matrix.node-version == 20

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          ESM_SIZE=$(gzip -c dist/index.esm.js | wc -c)
          CJS_SIZE=$(gzip -c dist/index.cjs.js | wc -c)
          echo "ESM gzipped: ${ESM_SIZE} bytes"
          echo "CJS gzipped: ${CJS_SIZE} bytes"
          # Fail if either bundle exceeds 20KB gzipped
          if [ "$ESM_SIZE" -gt 20480 ]; then
            echo "ESM bundle too large: ${ESM_SIZE} bytes (limit: 20480)"
            exit 1
          fi

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
